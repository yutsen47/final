<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>療癒書屋 — 首頁</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

<header>
  <a href="index.html" class="store-name">療癒書屋</a>
  <div class="header-right">
    <a href="shop.html" class="shop-link">全部商品</a>
    <button class="header-auth-btn" id="auth-btn">登入 / 註冊</button>
    <div class="header-user" id="user-info" hidden>
      <div class="header-user-dropdown">
        <a href="member.html" class="header-user-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span id="header-username"></span>
        </a>
        <div class="user-dropdown-menu">
          <a href="member.html" class="user-dropdown-item">會員中心</a>
          <a href="about.html" class="user-dropdown-item">組員介紹</a>
        </div>
      </div>
      <button class="header-logout-btn" id="logout-btn">登出</button>
    </div>
    <button class="cart-btn" id="cart-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      購物車
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</header>

<nav>
  <ul class="type">
    <li data-cat-id="books">
      <span class="nav-label">書本</span>
      <ul class="submenu">
        <li data-sub-id="fiction">文學小說</li>
        <li data-sub-id="business">商業理財</li>
        <li data-sub-id="psychology">心理勵志</li>
      </ul>
    </li>
    <li data-cat-id="stationery">
      <span class="nav-label">文具</span>
      <ul class="submenu">
        <li data-sub-id="pens">筆類</li>
        <li data-sub-id="notebooks">筆記本</li>
        <li data-sub-id="fire">火漆</li>
      </ul>
    </li>
    <li data-cat-id="creative">
      <span class="nav-label">文創商品</span>
      <ul class="submenu">
        <li data-sub-id="type">紙膠帶</li>
        <li data-sub-id="others">聯名商品</li>
        <li data-sub-id="stamp">印章</li>
      </ul>
    </li>
  </ul>
</nav>

<section class="hero-carousel" id="hero-carousel">
  <div class="carousel-track" id="carousel-track"></div>
  <div class="carousel-progress-bar" id="carousel-progress"></div>
  <div class="carousel-dots" id="carousel-dots"></div>
  <button class="carousel-nav prev" id="carousel-prev">&#8249;</button>
  <button class="carousel-nav next" id="carousel-next">&#8250;</button>
</section>

<section class="bestsellers-section">
  <div class="bestsellers-inner">
    <div class="home-section-header">
      <h2 class="home-section-title">暢銷商品</h2>
      <a href="shop.html" class="view-all-link">查看全部 →</a>
    </div>
    <div class="product-grid" id="bestsellers-grid"></div>
  </div>
</section>

<footer>
  <span>
    <a href="#">官方粉絲團</a>
    <span class="footer-sep">|</span>
    <a href="#">聯絡資訊：03-666-6666</a>
    <span class="footer-sep">|</span>
    <a href="#">地址</a>
  </span>
  <span class="footer-copy">© 2026 療癒書屋. All rights reserved.</span>
</footer>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="js/data.js"></script>
<script src="js/home.js"></script>
<script src="js/shared.js"></script>
</body>
</html>
